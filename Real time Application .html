<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real-Time Chat UI</title>
  <style>
    :root {
      --bg: #f5f7ff;
      --panel: #ffffff;
      --panel-2: #eef2ff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #7c3aed;
      --accent-2: #ec4899;
      --sent: linear-gradient(135deg, #7c3aed, #ec4899);
      --received: #ffffff;
      --shadow: 0 14px 35px rgba(124, 58, 237, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #fdf2f8 0%, #eef2ff 45%, #f5f7ff 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .chat-app {
      width: 100%;
      max-width: 900px;
      height: min(85vh, 780px);
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(124, 58, 237, 0.12);
      border-radius: 24px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .chat-header {
      padding: 18px 22px;
      background: linear-gradient(90deg, rgba(124, 58, 237, 0.12), rgba(236, 72, 153, 0.12));
      border-bottom: 1px solid rgba(124, 58, 237, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-title h1 {
      margin: 0;
      font-size: 1.1rem;
    }

    .chat-title p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .status-dot {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      color: #86efac;
      font-size: 0.9rem;
    }

    .status-dot span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 10px #4ade80;
    }

    .messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      scroll-behavior: smooth;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: linear-gradient(180deg, rgba(124, 58, 237, 0.03), transparent);
    }

    .message {
      max-width: 75%;
      padding: 12px 14px;
      border-radius: 16px;
      line-height: 1.45;
      animation: fadeInUp 0.3s ease;
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }

    .message.sent {
      align-self: flex-end;
      background: var(--sent);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.received {
      align-self: flex-start;
      background: var(--received);
      color: var(--text);
      border: 1px solid rgba(124, 58, 237, 0.08);
      border-bottom-left-radius: 4px;
    }

    .message-text {
      margin: 0;
      font-size: 0.95rem;
    }

    .message-time {
      display: block;
      margin-top: 6px;
      font-size: 0.74rem;
      opacity: 0.78;
      text-align: right;
    }

    .composer {
      padding: 16px 18px;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: rgba(248, 250, 255, 0.96);
      display: flex;
      gap: 10px;
    }

    .composer input {
      flex: 1;
      border: 1px solid rgba(124, 58, 237, 0.16);
      background: #ffffff;
      color: var(--text);
      padding: 12px 14px;
      border-radius: 999px;
      outline: none;
      font-size: 0.95rem;
    }

    .composer input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.14);
    }

    .composer button {
      border: none;
      background: var(--sent);
      color: white;
      padding: 12px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 20px rgba(236, 72, 153, 0.18);
    }

    .composer button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(236, 72, 153, 0.24);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .chat-app { height: 100vh; border-radius: 0; }
      .message { max-width: 90%; }
      .composer { padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="chat-app">
    <header class="chat-header">
      <div class="chat-title">
        <h1>Realtime Chat</h1>
        <p>Frontend-only chat experience</p>
      </div>
      <div class="status-dot"><span></span>Online</div>
    </header>

    <section class="messages" id="messages"></section>

    <form class="composer" id="composer">
      <input id="messageInput" type="text" placeholder="Type a message..." autocomplete="off" />
      <button type="submit">Send</button>
    </form>
  </div>

  <script>
    const storageKey = 'realtime-chat-messages';
    const messagesContainer = document.getElementById('messages');
    const composerForm = document.getElementById('composer');
    const messageInput = document.getElementById('messageInput');
    const apiUrl = 'http://localhost:3000/api/chat';

    function getTimeStamp() {
      const now = new Date();
      return now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    }

    function saveMessages(messages) {
      localStorage.setItem(storageKey, JSON.stringify(messages));
    }

    function loadMessages() {
      const saved = localStorage.getItem(storageKey);
      if (!saved) {
        return [
          { sender: 'received', text: 'Welcome! Send a message to start chatting.', time: getTimeStamp() }
        ];
      }

      try {
        const parsed = JSON.parse(saved);
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        console.error('Failed to load chat history:', error);
        return [];
      }
    }

    let messages = loadMessages();

    function renderMessages() {
      messagesContainer.innerHTML = '';
      messages.forEach((message) => {
        const bubble = document.createElement('div');
        bubble.className = `message ${message.sender}`;
        bubble.innerHTML = `
          <p class="message-text">${escapeHtml(message.text)}</p>
          <span class="message-time">${message.time}</span>
        `;
        messagesContainer.appendChild(bubble);
      });
      messagesContainer.scrollTo({ top: messagesContainer.scrollHeight, behavior: 'smooth' });
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function addMessage(sender, text) {
      messages.push({ sender, text, time: getTimeStamp() });
      saveMessages(messages);
      renderMessages();
    }

    async function getBotReply(text) {
      try {
        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        const data = await response.json();
        return data.reply || 'Sorry, I could not respond.';
      } catch (error) {
        console.error('Chat API error:', error);
        return 'Sorry, I could not reach the AI service.';
      }
    }

    composerForm.addEventListener('submit', async function (event) {
      event.preventDefault();
      const text = messageInput.value.trim();
      if (!text) return;

      addMessage('sent', text);
      messageInput.value = '';

      const reply = await getBotReply(text);
      addMessage('received', reply);
    });

    messageInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        composerForm.requestSubmit();
      }
    });

    renderMessages();
  </script>
</body>
</html>
